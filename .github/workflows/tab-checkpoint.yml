name: Release tab-checkpoint

on:
  push:
    branches:
      - main
      - beta
    paths:
      - .github/workflows/tab-checkpoint.yml
      - code/package.json
      - code/pnpm-lock.yaml
      - code/pnpm-workspace.yaml
      - code/turbo.json
      - code/packages/**
      - code/extensions/tab-checkpoint/**

permissions:
  contents: write

jobs:
  release-and-submit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for tab-checkpoint changes
        id: check-changes
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif ! git rev-parse --verify --quiet "${{ github.event.before }}^{commit}"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "${{ github.event.before }}" HEAD -- extensions/tab-checkpoint/ | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.check-changes.outputs.changed == 'true'
        uses: pnpm/action-setup@v4
        with:
          package_json_file: code/package.json

      - name: Setup Node
        if: steps.check-changes.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: code/pnpm-lock.yaml

      - name: Install dependencies
        if: steps.check-changes.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Zip Extension
        if: steps.check-changes.outputs.changed == 'true'
        run: pnpm --filter tab-checkpoint zip

      - name: Get Version
        id: version
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          VERSION=$(jq -r .version extensions/tab-checkpoint/package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.check-changes.outputs.changed == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: tab-checkpoint-v${{ steps.version.outputs.version }}${{ github.ref_name == 'beta' && '-beta' || '' }}
          target_commitish: ${{ github.sha }}
          name: tab-checkpoint v${{ steps.version.outputs.version }}${{ github.ref_name == 'beta' && ' (Beta)' || '' }}
          files: code/extensions/tab-checkpoint/.output/*-chrome.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ github.ref_name == 'beta' }}


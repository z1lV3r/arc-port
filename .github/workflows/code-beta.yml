name: Release beta code

on:
  push:
    branches:
      - beta

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: code/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Zip Extension
        run: pnpm --filter tab-checkpoint zip

      - name: Get Version
        id: version
        run: |
          VERSION=$(jq -r .version extensions/tab-checkpoint/package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}-beta
          target_commitish: ${{ github.sha }}
          name: Release v${{ steps.version.outputs.version }} (Beta)
          files: code/extensions/tab-checkpoint/.output/*-chrome.zip
          generate_release_notes: true
          draft: false
          prerelease: true
